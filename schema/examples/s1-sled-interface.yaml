schema_version: atos.s1.interface.v0
kind: SledInterface
metadata:
  id: s1-interface-prototype
  name: S1 modular sled interface
  status: provisional_prototype
geometry:
  units: mm
  length_over_coupler_faces: 320
  structural_deck_length: 280
  width: 72
  deck_height_above_guideway_datum: 30
  module_footprint:
    length: 240
    width: 64
  datums:
    guideway: G0
    deck: D0
    coupler: C0
    module_interface: M0
    longitudinal_center_plane: X0
    lateral_center_plane: Y0
attachment:
  station_count: 4
  station_coordinates_mm:
    - { id: front_left, x: 90, y: 24, z: 0 }
    - { id: front_right, x: 90, y: -24, z: 0 }
    - { id: rear_left, x: -90, y: 24, z: 0 }
    - { id: rear_right, x: -90, y: -24, z: 0 }
  pin_diameter_mm: 5
  latch_pin_clearance_mm: 0.35
  structural_alignment_source: mechanical_stations
  electrical_connector_structural_role: none
coupler:
  pivot_spacing_mm: 280
  drawbar_length_mm: 28
  normal_yaw_deg: 15
  hard_stop_yaw_deg: 18
  route_planning_usable_fraction: 0.8
  vertical_play_mm: 1.5
ballast:
  quadrant_pockets: true
  longitudinal_channel: true
  elevated_mount: true
  datum_marks: [X0, Y0, D0, M0]
prototype_limits:
  max_module_mass_kg: 1.5
  max_composed_mass_kg: 2.5
  normal_cg_x_abs_mm: 30
  normal_cg_y_abs_mm: 5
  normal_cg_z_above_deck_mm: 45
  test_only_cg_z_above_deck_mm: 65
route_admission_checks:
  - interface_version
  - attachment_state
  - declared_vs_measured_mass
  - cg_x_y_z
  - support_node_loads
  - envelope_class
  - minimum_curve_radius
  - coupler_articulation
  - swept_envelope
  - acceleration_braking_margin
  - power_thermal
  - platform_station_clearance
  - payload_shift_risk
  - degraded_sensor_support_or_coupler
non_certification_notice: Prototype fit, packaging, clearance, and CG experiment interface only.

